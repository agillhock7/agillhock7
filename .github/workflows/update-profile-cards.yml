name: Update Profile Cards

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/update-profile-cards.yml"
      - "scripts/generate_stats_card.py"
      - "scripts/generate_header.py"
      - "scripts/generate_tech_badges.py"
      - "scripts/generate_featured_content.py"
      - "scripts/update_readme_cache_bust.py"
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure assets directory
        run: mkdir -p assets

      - name: Install Python dependencies
        run: python3 -m pip install --user pillow

      - name: Generate header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: agillhock7
          HEADER_HEIGHT: "240"
        run: python3 scripts/generate_header.py

      - name: Generate tech stack badges
        run: python3 scripts/generate_tech_badges.py

      - name: Generate featured project content
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: agillhock7
        run: python3 scripts/generate_featured_content.py

      - name: Generate stats card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: agillhock7
        run: python3 scripts/generate_stats_card.py

      - name: Download remaining cards
        run: |
          CACHE_BUST="$(date -u +%Y%m%d%H%M)"
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=agillhock7&theme=github_dark&v=${CACHE_BUST}" -o assets/top-langs.svg
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 "https://streak-stats.demolab.com?user=agillhock7&hide_border=true&theme=tokyonight&ring=22c55e&fire=22c55e&currStreakLabel=22c55e&v=${CACHE_BUST}" -o assets/streak.svg
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 2 "https://github-readme-activity-graph.vercel.app/graph?username=agillhock7&bg_color=0b1220&color=8ccfaf&line=22c55e&point=9be9a8&area=true&area_color=1f5f4a&hide_border=true&custom_title=Contribution%20Activity&radius=8&v=${CACHE_BUST}" -o assets/activity-graph.svg

      - name: Update README cache bust query params
        run: python3 scripts/update_readme_cache_bust.py

      - name: Commit updated cards
        uses: EndBug/add-and-commit@v9
        with:
          add: "assets/**/*.svg assets/**/*.png assets/**/*.jpg README.md"
          message: "chore: update profile cards"
          default_author: github_actions
